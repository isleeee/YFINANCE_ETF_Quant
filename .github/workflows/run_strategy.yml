name: ETF Momentum Strategy

on:
  schedule:
    # 每天北京时间 14:20 执行 (14:20 - 8 = 06:20 UTC)
    - cron: '20 6 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4  # <-- 这里修正了！
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests

      - name: Run strategy
        env:
          SC_KEY: ${{ secrets.SC_KEY }}
        run: python main.py
